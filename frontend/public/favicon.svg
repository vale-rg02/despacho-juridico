<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a2a4a"/>
  
  <!-- Scales of Justice -->
  <!-- Center pole -->
  <rect x="15.5" y="7" width="1" height="17" fill="#b8962e"/>
  
  <!-- Base -->
  <rect x="10" y="24" width="12" height="1.5" rx="0.75" fill="#b8962e"/>
  
  <!-- Top horizontal beam -->
  <rect x="7" y="9" width="18" height="1.2" rx="0.6" fill="#b8962e"/>
  
  <!-- Left chain -->
  <line x1="9" y1="10.2" x2="9" y2="15" stroke="#b8962e" stroke-width="0.8"/>
  <!-- Right chain -->
  <line x1="23" y1="10.2" x2="23" y2="15" stroke="#b8962e" stroke-width="0.8"/>
  
  <!-- Left pan -->
  <path d="M6 15 Q9 17.5 12 15" stroke="#b8962e" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M20 15 Q23 17.5 26 15" stroke="#b8962e" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  
  <!-- Left pan top line -->
  <line x1="6" y1="15" x2="12" y2="15" stroke="#b8962e" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Right pan top line -->
  <line x1="20" y1="15" x2="26" y2="15" stroke="#b8962e" stroke-width="0.9" stroke-linecap="round"/>
  
  <!-- Center knob at top -->
  <circle cx="16" cy="8.5" r="1.2" fill="#b8962e"/>
</svg>
